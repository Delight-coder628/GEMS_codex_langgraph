mllm:
  base_url: "${MLLM_BASE_URL}"
  api_key: "${MLLM_API_KEY}"
  model: "${MLLM_MODEL}"
  timeout_seconds: 600
  max_retries: 2

generator:
  url: "${GENERATOR_URL}"
  timeout_seconds: 600
  max_retries: 1
  width: 1024
  height: 1024
  num_inference_steps: 9
  guidance_scale: 0.0
  seed: null

ocr:
  enabled: false
  backend: "paddle_local"
  url: "${OCR_URL}"
  timeout_seconds: 60
  min_confidence: 0.5
  normalized_match_threshold: 0.8

editor:
  enabled: false
  url: "${EDITOR_URL}"
  timeout_seconds: 600
  max_retries: 1
  max_edits_per_run: 1
  mask_padding_ratio: 0.25

agent:
  max_iterations: 5
  verifier_repair_attempts: 2
  artifact_root: "outputs/langgraph_runs"
  skills_dir: "agent/skills"
  verbose: true
